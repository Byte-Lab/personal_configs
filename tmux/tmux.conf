# Render terminals in color in tmux.
set -g default-terminal "tmux-256color"

# Advertise bracketed-paste support to tmux for xterm-family outer terminals
# (iTerm2, xterm, etc). Without this, tmux strips the ESC[200~/ESC[201~
# sequences the outer terminal wraps pasted text in, and nvim can't tell a
# paste from typed input -- autoindent then mangles the pasted content.
set -as terminal-features ',xterm*:bpaste'

# Pass modified keys (Shift+Enter, Ctrl+Tab, etc.) through tmux using the
# CSI-u / modifyOtherKeys encoding. Without this, keys like Shift+Enter
# collapse to plain Enter, so Claude Code and similar TUIs can't distinguish
# them from a submit.
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'



# Automaticaly set window title.
set-window-option -g automatic-rename on
set-option -g set-titles on

# Remap prefix key to C-t, rather than C-b.
unbind C-b
set-option -g prefix C-t
bind-key C-t send-prefix

# Increase buffer history size to something large:
set-option -g history-limit 20000
set -g history-limit 100000

bind -n C-k clear-history

# No delay for escape key press.
set -sg escape-time 0

# Enable focus events
set -g focus-events on

# Be notified in the status area when a window has activity.
setw -g monitor-activity on
set -g visual-activity on

TMUX_CONF_DIR="$HOME/.personal_configs/tmux"

# Vim settings:
source-file "$TMUX_CONF_DIR/vim.conf"

# Color settings:
source-file "$TMUX_CONF_DIR/color.conf"

# Clipboard:
set -g set-clipboard on
set -ga terminal-overrides ',*:Ms=\E]52;c;%p2%s\7'
